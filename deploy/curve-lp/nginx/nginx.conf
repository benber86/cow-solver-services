user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;
    client_max_body_size 15m;

    log_format solver '$remote_addr [$time_local] "$request" '
                      '$status us=$upstream_status '
                      'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time '
                      'rid=$http_x_request_id';

    access_log /dev/stdout solver;
    error_log /dev/stderr;

    # HTTP - handles ACME challenge and redirects
    server {
        listen 80;
        server_name $DOMAIN;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (works even without SSL)
        location /healthz {
            proxy_pass http://solver:7872/healthz;
            proxy_set_header Host $host;
        }

        # Redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name $DOMAIN;

        ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # CoW Protocol endpoints: {base_url}/{envName}/{network}/...
        # prod -> solver (production settlement contract)
        # staging/shadow -> solver-staging (staging settlement contract)
        # Trailing slash on both location and proxy_pass strips the prefix.
        # e.g. /shadow/mainnet/curve-lp/solve -> /curve-lp/solve

        location /shadow/mainnet/ {
            proxy_pass http://solver-staging:7872/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /staging/mainnet/ {
            proxy_pass http://solver-staging:7872/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /prod/mainnet/ {
            proxy_pass http://solver:7872/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /healthz {
            proxy_pass http://solver:7872/healthz;
            proxy_set_header Host $host;
        }
    }
}
