user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;
    client_max_body_size 15m;

    log_format solver '$remote_addr [$time_local] "$request" '
                      '$status us=$upstream_status '
                      'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time '
                      'rid=$http_x_request_id';

    access_log /dev/stdout solver;
    error_log /dev/stderr;

    # Docker's embedded DNS. Nginx normally resolves proxy_pass hostnames
    # once at startup and refuses to start if any can't be resolved. With a
    # resolver + variable `proxy_pass` below, hostnames resolve at request
    # time — so nginx starts even when a backend container is absent, and a
    # missing backend only 502s that one location. This is what lets solver
    # deploys happen without touching ingress.
    #
    # Caveat: 127.0.0.11 is Docker's per-network embedded DNS. Works here
    # because all services share one compose project. If nginx is ever split
    # into its own compose project, change this.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # HTTP - handles ACME challenge and redirects
    server {
        listen 80;
        server_name $DOMAIN;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (works even without SSL). Public /healthz probes the
        # mainnet prod solver for back-compat with existing monitors.
        # Per-chain liveness is available under /prod/{chain}/healthz which
        # flows through the usual /prod/{chain}/ location below.
        location /healthz {
            set $hz_upstream http://solver:7872;
            proxy_pass $hz_upstream/healthz;
            proxy_set_header Host $host;
        }

        # Redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name $DOMAIN;

        ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # CoW Protocol endpoints: {base_url}/{envName}/{network}/...
        # Each location uses a `set $upstream ...; proxy_pass $upstream;`
        # pattern so the hostname is resolved lazily at request time via the
        # `resolver` above. The rewrite strips the /{envName}/{network}/
        # prefix and forwards only the tail; nginx's usual trailing-slash
        # strip trick doesn't work with variable proxy_pass targets.
        #
        # e.g. /prod/arbitrum/curve-lp/solve -> arbitrum:7872/curve-lp/solve

        location /shadow/mainnet/ {
            set $upstream http://solver-staging:7872;
            rewrite ^/shadow/mainnet(/.*)$ $1 break;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /staging/mainnet/ {
            set $upstream http://solver-staging:7872;
            rewrite ^/staging/mainnet(/.*)$ $1 break;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /prod/mainnet/ {
            set $upstream http://solver:7872;
            rewrite ^/prod/mainnet(/.*)$ $1 break;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /prod/arbitrum/ {
            set $upstream http://arbitrum:7872;
            rewrite ^/prod/arbitrum(/.*)$ $1 break;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /prod/gnosis/ {
            set $upstream http://gnosis:7872;
            rewrite ^/prod/gnosis(/.*)$ $1 break;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        # --- staging / shadow routes for arbitrum + gnosis.
        #
        # These route to the PROD containers (`arbitrum`, `gnosis`), not a
        # dedicated staging container: CoW hasn't deployed a shadow
        # settlement on these chains yet, so prod and staging would be
        # byte-for-byte identical anyway. The URLs exist so CoW can
        # register both `{env}/{network}/` slots and we can distinguish
        # them in monitoring.
        #
        # When CoW ships real shadow settlement on these chains, add
        # arbitrum-staging + gnosis-staging compose services and flip the
        # `set $upstream …` lines below to point at them.

        location /staging/arbitrum/ {
            set $upstream http://arbitrum:7872;
            rewrite ^/staging/arbitrum(/.*)$ $1 break;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /shadow/arbitrum/ {
            set $upstream http://arbitrum:7872;
            rewrite ^/shadow/arbitrum(/.*)$ $1 break;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /staging/gnosis/ {
            set $upstream http://gnosis:7872;
            rewrite ^/staging/gnosis(/.*)$ $1 break;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        location /shadow/gnosis/ {
            set $upstream http://gnosis:7872;
            rewrite ^/shadow/gnosis(/.*)$ $1 break;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 86400;
        }

        # /monitor (no trailing slash) — exact match, redirect to /monitor/.
        # Nginx's `location /monitor/` only matches with the slash; without
        # this, /monitor falls through and 404s against the default root.
        location = /monitor {
            return 301 /monitor/;
        }

        # Monitor UI — optional, Basic-auth-gated. The realm string is sent
        # unauthenticated, so don't put anything sensitive in it.
        #
        # Note on alias + try_files: we explicitly name index.html in
        # try_files because `$uri/` after `alias` can resolve to a path
        # with a double slash that nginx can't stat (-> 500). Naming the
        # file bypasses the auto-index machinery.
        location /monitor/ {
            auth_basic "curve-lp monitor";
            auth_basic_user_file /etc/nginx/htpasswd;
            alias /usr/share/nginx/monitor/;
            try_files $uri $uri/index.html =404;
        }

        # Sanitized per-chain config JSON. Generated at deploy time from the
        # source TOMLs by deploy.sh — NEVER a processed TOML (those contain
        # RPC API keys). See deploy.sh `emit_monitor_json`.
        location /monitor/config/ {
            auth_basic "curve-lp monitor";
            auth_basic_user_file /etc/nginx/htpasswd;
            alias /usr/share/nginx/monitor-config/;
            types { application/json json; }
            default_type application/json;
        }

        location /healthz {
            set $hz_upstream http://solver:7872;
            proxy_pass $hz_upstream/healthz;
            proxy_set_header Host $host;
        }
    }
}
