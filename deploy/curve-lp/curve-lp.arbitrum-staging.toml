# Curve LP Solver - Arbitrum One Staging Configuration
#
# Shares the same chain, RPC, router and token-allowlist as the prod
# Arbitrum config; only the settlement contract differs (CoW staging /
# shadow settlement at 0xf553…cb13 — orders routed to this container go
# through CoW shadow competitions, not real settlement).
#
# SECRETS: This file contains NO secrets.
# NODE_URL is injected via environment variable — same NODE_URL_ARBITRUM
# as the prod arbitrum container; RPC quota is shared between the two.

chain-id = 42161
router-address = "0x2191718CD32d02B8E60BAdFFeA33E4B5DD9A0A0D"
wrapped-native-token = "0x82aF49447D8a07e3bd95BD0d56f35241523fBab1"
price-api-chain = "arbitrum"

# RPC for on-chain verification (injected from environment)
node-url = "${NODE_URL}"

# Curve APIs (public, no auth needed)
curve-api-url = "https://www.curve.finance/api/router/v1/routes"
curve-price-api-url = "https://prices.curve.finance/"

# Token filtering — see README for how lp-tokens / allowed-buy-tokens /
