version: '3.8'

services:
  # Creates dummy cert if none exists, so nginx can start
  certbot-init:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN}
    entrypoint: /bin/sh
    command: >
      -c '
        if [ ! -d /etc/letsencrypt/live/$$DOMAIN ]; then
          echo "Creating dummy certificate for nginx to start...";
          mkdir -p /etc/letsencrypt/live/$$DOMAIN;
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout /etc/letsencrypt/live/$$DOMAIN/privkey.pem \
            -out /etc/letsencrypt/live/$$DOMAIN/fullchain.pem \
            -subj "/CN=localhost";
        fi
      '

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.template:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      certbot-init:
        condition: service_completed_successfully
    # Solver services are intentionally NOT in depends_on. Nginx resolves them
    # lazily via Docker's embedded DNS (see nginx.conf `resolver` directive),
    # so it can start / restart without every backend being present, and a
    # chain deploy can happen without touching ingress.
    restart: unless-stopped
    entrypoint: /bin/sh
    command: >
      -c '
        sed "s/\$$DOMAIN/$$DOMAIN/g" /etc/nginx/nginx.template > /etc/nginx/nginx.conf;
        exec nginx -g "daemon off;"
      '
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Gets real cert and handles renewals
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    environment:
      - DOMAIN=${DOMAIN}
      - SSL_EMAIL=${SSL_EMAIL}
    entrypoint: /bin/sh
    command: >
      -c '
        # Wait for nginx to be ready
        echo "Waiting for nginx...";
        sleep 10;

        # Check if we have a real cert (not self-signed)
        if [ ! -f /etc/letsencrypt/renewal/$$DOMAIN.conf ]; then
          echo "Getting real certificate from Lets Encrypt...";
          certbot certonly --webroot --webroot-path=/var/www/certbot \
            --email $$SSL_EMAIL --agree-tos --no-eff-email \
            --force-renewal -d $$DOMAIN;
          if [ $$? -eq 0 ]; then
            echo "Certificate obtained! Nginx will reload shortly.";
          fi
        else
          echo "Real certificate already exists.";
        fi;

        # Renewal loop
        echo "Starting renewal loop...";
        while :; do
          sleep 12h;
          echo "Checking for renewal...";
          certbot renew --webroot --webroot-path=/var/www/certbot;
        done
      '
    depends_on:
      - nginx
    restart: unless-stopped

  solver:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: solvers
    command: >
      --addr 0.0.0.0:7872
      curvelp
      --config /config/curve-lp.toml
    expose:
      - "7872"
    volumes:
      - ./processed/curve-lp.toml:/config/curve-lp.toml:ro
    environment:
      - NODE_URL=${NODE_URL}
      - USE_JSON_LOGS=true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  solver-staging:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: solvers
    command: >
      --addr 0.0.0.0:7872
      curvelp
      --config /config/curve-lp-staging.toml
    expose:
      - "7872"
    volumes:
      - ./processed/curve-lp-staging.toml:/config/curve-lp-staging.toml:ro
    environment:
      - NODE_URL=${NODE_URL}
      - USE_JSON_LOGS=true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  arbitrum:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: solvers
    command: >
      --addr 0.0.0.0:7872
      curvelp
      --config /config/curve-lp-arbitrum.toml
    expose:
      - "7872"
    volumes:
      - ./processed/curve-lp-arbitrum.toml:/config/curve-lp-arbitrum.toml:ro
    environment:
      - NODE_URL=${NODE_URL_ARBITRUM}
      - USE_JSON_LOGS=true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  gnosis:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: solvers
    command: >
      --addr 0.0.0.0:7872
      curvelp
      --config /config/curve-lp-gnosis.toml
    expose:
      - "7872"
    volumes:
      - ./processed/curve-lp-gnosis.toml:/config/curve-lp-gnosis.toml:ro
    environment:
      - NODE_URL=${NODE_URL_GNOSIS}
      - USE_JSON_LOGS=true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  certbot-etc:
  certbot-www:
